<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Michele Gentile (MiViGe) - Blog">
  <title>Blog | MiViGe</title>
  <link rel="icon" type="image/x-icon" href="/assets/img/icons/favicon.ico">
  
  <link rel="stylesheet" href="/assets/css/style.css">
  <link rel="stylesheet" href="/assets/css/layout.css">
  <link rel="stylesheet" href="/assets/css/components.css">
  <link rel="stylesheet" href="/assets/css/blog.css">
  
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
</head>
<body>
  <div class="background-animation">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
  </div>

  <div id="header-placeholder"></div>

  <main style="padding-top: 120px; min-height: 80vh;">
    
    <section id="blog-archive" data-aos="fade-up" style="padding-top: 0;">
      <div class="blog-header">
        <h1 style="font-size: 3rem; color: var(--primary);">Blog</h1>
        <p style="font-size: 1.1rem; color: #555; max-width: 600px; margin: 0 auto;">
          Thoughts, technical write-ups, project reflections...
        </p>
      </div>

      <div class="blog-grid" id="blog-grid">
        <!-- Javascript will inject posts here -->
      </div>
    </section>

  </main>

  <div id="footer-placeholder"></div>

  <script src="/assets/js/main.js"></script>
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({
      duration: 800,
      once: true,
    });

    document.addEventListener("DOMContentLoaded", () => {
      fetch('posts.json')
        .then(response => response.json())
        .then(posts => {
          // Sort posts by date from most recent to last
          posts.sort((a, b) => new Date(b.date) - new Date(a.date));
          
          const grid = document.getElementById('blog-grid');
          
          posts.forEach((post, index) => {
            const isLatest = index === 0;
            const hasBanner = !!post.banner;
            const cardClass = `blog-card ${isLatest ? 'featured' : ''} ${!hasBanner ? 'no-image' : ''}`;
            
            // Format Date safely
            const postDate = new Date(post.date).toLocaleDateString("en-US", { year: 'numeric', month: 'long', day: 'numeric' });

            const tagsArray = post.tags || [];

            // Construct Card Inner HTML structure
            const cardHTML = `
              <h3>${post.title}</h3>
              <div class="blog-card-meta">
                <span class="blog-date-pill">${postDate}</span>
                ${tagsArray.slice(0, 2).map(tag => `<span class="blog-tag-pill">${tag}</span>`).join('')}
              </div>
              <p>${post.summary}</p>
              <div class="blog-read-more">
                <span class="cta-button small-btn">Read Post</span>
              </div>
            `;

            const imageHTML = hasBanner ? `<img src="${post.banner}" alt="${post.title}" class="blog-card-image">` : '';

            // Combine into the a tag
            const a = document.createElement('a');
            a.className = cardClass;
            a.href = `post.html?id=${post.id}`;
            a.dataset.aos = 'fade-up';
            a.dataset.aosDelay = (index * 100).toString();
            
            a.innerHTML = `
              ${imageHTML}
              <div class="blog-card-content">
                ${cardHTML}
              </div>
            `;

            grid.appendChild(a);
          });
        })
        .catch(err => {
          console.error("Could not load blog posts:", err);
          document.getElementById('blog-grid').innerHTML = '<p style="text-align:center;width:100%;grid-column:1/-1;">No posts found right now. Check back later!</p>';
        });
    });
  </script>
  <!-- Cloudflare Web Analytics -->
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js'
    data-cf-beacon='{"token": "1e469c717a004f1fa8ff47b44364a917"}'></script>
</body>
</html>
